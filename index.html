<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css" integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ" crossorigin="anonymous">
  </head>
  <body>
    <div class="container">

      <header>
        <h1>Rock🪨 Paper📃 Scissor✂️</h1>
      </header>
      <div id="inside">


        <p id="instruction">Select your Choice:</p>

        <div class="choice">

          <div class="select-choice" id="rock">
            <img class="img-weapon" src="rock1.png" alt="rock">
          </div>

          <div class="select-choice" id="paper">
            <img class="img-weapon" src="paper1.png" alt="paper">
          </div>

          <div class="select-choice" id="scissors">
            <img class="img-weapon" src="scissor1.png" alt="scissors">
          </div>

        </div>


        <div class="result">
          
            <p id="message">Who will win the first game? <br> You👤 or AI 🤖..</p>

        <div class="scores">
          <p class="total-score">Your score: <span id="user-score">0</span></p>
          <p class="total-score">AI's score: <span id="computer-score">0</span></p>
          <p class="total-score">Draws: <span id="draws">0</span></p>

          <button id="reset-button">Reset</button>
        </div>

        </div>

    </div>

      <footer>
        <p style="font-size: medium;">&copy; 2026 ADABALA VINAYAK. All rights reserved. </p>&ensp;
        <p><a href="https://github.com/Vinayak4332" target="_blank"><i class="fab fa-brands fa-github fa-2x"></i></a><a href="https://www.linkedin.com/in/vinayak-adabala/" target="_blank"><i class="fab fa-brands fa-linkedin-in fa-2x"></i></a></p>
        <p></p>
          
      </footer>

    </div>
    <script type="text/javascript" src="script.js"></script>
  </body>
</html>
